{% extends "layout.html" %}
{% block title %}请假审批{% endblock %}
{% block extra_head %}
<style>
.status-tag {
    display: inline-block; padding: 3px 12px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 600;
}
.status-pending { background: #fef3c7; color: #92400e; }
.status-approved { background: #d1fae5; color: #065f46; }
.status-rejected { background: #fee2e2; color: #991b1b; }
.btn-action {
    display: inline-block; padding: 4px 12px; border-radius: 8px; border: none;
    font-size: 0.7rem; font-weight: 600; cursor: pointer; transition: all 0.15s; margin: 1px 2px;
}
.btn-approve { background: #10b981; color: #fff; }
.btn-approve:hover { background: #059669; }
.btn-reject { background: #ef4444; color: #fff; }
.btn-reject:hover { background: #dc2626; }
.remark-input { padding: 4px 8px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 0.72rem; width: 100px; }
</style>
{% endblock %}
{% block content %}
<h2 style="font-size:1.15rem;font-weight:700;color:#1e293b;margin-bottom:4px;">
    <i class="fas fa-calendar-check" style="color:#6366f1;"></i> 请假审批管理
</h2>
<p style="font-size:0.82rem;color:#94a3b8;margin-bottom:16px;">审核学生请假申请</p>

<div class="card-clean">
    <div class="card-title"><i class="fas fa-list-check"></i> 所有请假申请</div>
    <table class="table-clean">
        <thead><tr>
            <th>学生</th><th>宿舍</th><th>类型</th><th>日期</th><th>原因</th><th>状态</th><th>备注</th><th>操作</th>
        </tr></thead>
        <tbody id="leaveTbody">
            <tr><td colspan="8" style="text-align:center;color:#94a3b8;">加载中...</td></tr>
        </tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
function loadLeaves() {
    fetch("/api/leaves/all").then(function(r){return r.json()}).then(function(data){
        var h = "";
        if (!data.length) { h = '<tr><td colspan="8" style="text-align:center;color:#94a3b8;">暂无请假申请</td></tr>'; }
        else {
            data.forEach(function(l){
                var statusMap = {pending:["待审批","status-pending"], approved:["已通过","status-approved"], rejected:["已拒绝","status-rejected"]};
                var s = statusMap[l.status] || [l.status,""];
                var actions = "";
                if (l.status === "pending") {
                    actions = '<input class="remark-input" id="remark-'+l.id+'" placeholder="备注(可选)"> ' +
                        '<button class="btn-action btn-approve" onclick="approve('+l.id+')">✓ 通过</button> ' +
                        '<button class="btn-action btn-reject" onclick="reject('+l.id+')">✗ 拒绝</button>';
                } else {
                    actions = '<span style="font-size:0.7rem;color:#94a3b8;">' + (l.admin_remark || '-') + '</span>';
                }
                h += '<tr id="row-'+l.id+'">' +
                    '<td><strong>' + esc(l.student_name || '') + '</strong><br><small style="color:#94a3b8;">' + esc(l.student_id) + '</small></td>' +
                    '<td>' + esc(l.dorm_number) + '</td>' +
                    '<td>' + esc(l.leave_type) + '</td>' +
                    '<td style="font-size:0.78rem;">' + esc(l.start_date) + '<br>' + esc(l.end_date) + '</td>' +
                    '<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + esc(l.reason) + '">' + esc(l.reason) + '</td>' +
                    '<td><span class="status-tag ' + s[1] + '">' + s[0] + '</span></td>' +
                    '<td id="remark-cell-'+l.id+'" style="font-size:0.76rem;color:#94a3b8;">' + (l.admin_remark || '-') + '</td>' +
                    '<td>' + actions + '</td>' +
                    '</tr>';
            });
        }
        document.getElementById("leaveTbody").innerHTML = h;
    });
}

function esc(s) { var d = document.createElement("div"); d.textContent = s||""; return d.innerHTML; }
function csrf() { var m = document.querySelector('meta[name="csrf-token"]'); return m?m.content:""; }

function approve(id) {
    var remark = (document.getElementById("remark-"+id) || {}).value || "";
    if (!confirm("确定通过此请假申请？")) return;
    fetch("/api/leaves/approve/" + id, {
        method:"POST",
        headers:{"Content-Type":"application/json","X-CSRFToken":csrf()},
        body: JSON.stringify({remark: remark})
    }).then(function(r){return r.json()}).then(function(d){
        if (d.ok) loadLeaves(); else alert(d.error||"操作失败");
    });
}

function reject(id) {
    var remark = (document.getElementById("remark-"+id) || {}).value || "";
    if (!remark) { alert("拒绝时请填写备注说明原因"); return; }
    if (!confirm("确定拒绝此请假申请？")) return;
    fetch("/api/leaves/reject/" + id, {
        method:"POST",
        headers:{"Content-Type":"application/json","X-CSRFToken":csrf()},
        body: JSON.stringify({remark: remark})
    }).then(function(r){return r.json()}).then(function(d){
        if (d.ok) loadLeaves(); else alert(d.error||"操作失败");
    });
}

loadLeaves();
</script>
{% endblock %}
