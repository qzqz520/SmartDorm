{% extends "layout.html" %}
{% block title %}请假申请{% endblock %}
{% block extra_head %}
<style>
.form-card {
    background: #fff; border-radius: 14px; padding: 22px 24px;
    border: 1px solid #f0f0f0; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    margin-bottom: 20px; max-width: 580px;
}
.form-card h5 { font-size: 0.9rem; font-weight: 700; color: #1e293b; margin: 0 0 16px; display: flex; align-items: center; gap: 6px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.78rem; font-weight: 600; color: #475569; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 9px 14px; border: 1.5px solid #e2e8f0; border-radius: 10px;
    font-size: 0.84rem; transition: all 0.2s; color: #1e293b;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    border-color: #6366f1; outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
}
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.status-tag {
    display: inline-block; padding: 3px 12px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 600;
}
.status-pending { background: #fef3c7; color: #92400e; }
.status-approved { background: #d1fae5; color: #065f46; }
.status-rejected { background: #fee2e2; color: #991b1b; }
</style>
{% endblock %}
{% block content %}
<h2 style="font-size:1.15rem;font-weight:700;color:#1e293b;margin-bottom:4px;">
    <i class="fas fa-calendar-alt" style="color:#6366f1;"></i> 请假申请
</h2>
<p style="font-size:0.82rem;color:#94a3b8;margin-bottom:16px;">提交请假申请并查看审批状态</p>

<div class="form-card">
    <h5><i class="fas fa-pen-to-square"></i> 新建请假申请</h5>
    <div class="form-group">
        <label>请假类型</label>
        <select id="leaveType">
            <option value="事假">事假</option>
            <option value="病假">病假</option>
            <option value="公假">公假</option>
            <option value="其他">其他</option>
        </select>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>开始日期</label>
            <input type="date" id="startDate">
        </div>
        <div class="form-group">
            <label>结束日期</label>
            <input type="date" id="endDate">
        </div>
    </div>
    <div class="form-group">
        <label>请假原因</label>
        <textarea id="reason" rows="3" placeholder="请详细描述请假原因..."></textarea>
    </div>
    <button class="btn-primary-clean" onclick="submitLeave()" id="submitBtn">
        <i class="fas fa-paper-plane"></i> 提交申请
    </button>
</div>

<div class="card-clean">
    <div class="card-title"><i class="fas fa-history"></i> 我的请假记录</div>
    <table class="table-clean" id="leaveTable">
        <thead><tr><th>类型</th><th>日期</th><th>原因</th><th>状态</th><th>审批备注</th><th>提交时间</th></tr></thead>
        <tbody id="leaveTbody"><tr><td colspan="6" style="text-align:center;color:#94a3b8;">加载中...</td></tr></tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
function loadLeaves() {
    fetch("/api/my_leaves").then(function(r){return r.json()}).then(function(data){
        var h = "";
        if (!data.length) { h = '<tr><td colspan="6" style="text-align:center;color:#94a3b8;">暂无请假记录</td></tr>'; }
        else {
            data.forEach(function(l){
                var statusMap = {pending:["待审批","status-pending"], approved:["已通过","status-approved"], rejected:["已拒绝","status-rejected"]};
                var s = statusMap[l.status] || [l.status,""];
                h += '<tr>' +
                    '<td>' + esc(l.leave_type) + '</td>' +
                    '<td>' + esc(l.start_date) + ' ~ ' + esc(l.end_date) + '</td>' +
                    '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(l.reason) + '</td>' +
                    '<td><span class="status-tag ' + s[1] + '">' + s[0] + '</span></td>' +
                    '<td style="color:#94a3b8;font-size:0.78rem;">' + (l.admin_remark || '-') + '</td>' +
                    '<td style="font-size:0.76rem;color:#94a3b8;">' + (l.created_at||'').slice(0,16) + '</td>' +
                    '</tr>';
            });
        }
        document.getElementById("leaveTbody").innerHTML = h;
    });
}

function esc(s) { var d = document.createElement("div"); d.textContent = s||""; return d.innerHTML; }

function submitLeave() {
    var type = document.getElementById("leaveType").value;
    var reason = document.getElementById("reason").value.trim();
    var startDate = document.getElementById("startDate").value;
    var endDate = document.getElementById("endDate").value;
    if (!reason) { alert("请填写请假原因"); return; }
    if (!startDate || !endDate) { alert("请选择开始和结束日期"); return; }
    if (startDate > endDate) { alert("开始日期不能晚于结束日期"); return; }

    var btn = document.getElementById("submitBtn");
    btn.disabled = true; btn.innerHTML = "⏳ 提交中...";

    var csrf = document.querySelector('meta[name="csrf-token"]').content;
    fetch("/api/leaves/add", {
        method: "POST",
        headers: {"Content-Type":"application/json","X-CSRFToken":csrf},
        body: JSON.stringify({leave_type:type, reason:reason, start_date:startDate, end_date:endDate})
    }).then(function(r){return r.json()}).then(function(data){
        if (data.ok) {
            alert("请假申请已提交！");
            document.getElementById("reason").value = "";
            document.getElementById("startDate").value = "";
            document.getElementById("endDate").value = "";
            loadLeaves();
        } else {
            alert(data.error || "提交失败");
        }
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> 提交申请';
    }).catch(function(){
        alert("网络错误，请重试");
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> 提交申请';
    });
}

loadLeaves();
</script>
{% endblock %}
