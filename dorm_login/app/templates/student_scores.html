{% extends "layout.html" %}
{% block title %}宿舍评分{% endblock %}
{% block extra_head %}
<style>
.badge-excellent { background: #d1fae5; color: #065f46; }
.badge-good { background: #dbeafe; color: #2563eb; }
.badge-warn { background: #fee2e2; color: #dc2626; }
.score-circle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 44px; height: 44px; border-radius: 50%; font-weight: 700;
    font-size: 1.05rem; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.score-excellent { background: linear-gradient(135deg,#10b981,#059669); }
.score-good { background: linear-gradient(135deg,#6366f1,#8b5cf6); }
.score-warn { background: linear-gradient(135deg,#ef4444,#dc2626); }
.empty-state { text-align: center; padding: 40px 20px; color: #94a3b8; }
.empty-state i { font-size: 2rem; margin-bottom: 10px; display: block; opacity: 0.4; }
</style>
{% endblock %}
{% block content %}
<div class="page-header">
    <h2><i class="fas fa-clipboard-check" style="color:#eab308;"></i> 宿舍评分记录</h2>
</div>
<div class="card-clean">
    <div class="card-title" style="border-bottom-color:#eab308;"><i class="fas fa-star"></i> 评分历史</div>
    <div style="overflow-x:auto;">
        <table class="table-clean">
            <thead><tr><th>卫生</th><th>安全</th><th>纪律</th><th>总分</th><th>评级</th><th>备注</th><th>检查时间</th></tr></thead>
            <tbody id="scores-list"></tbody>
        </table>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function getScoreClass(t) { return t >= 9 ? 'excellent' : t >= 7 ? 'good' : 'warn'; }
function getScoreLabel(t) { return t >= 9 ? '优秀' : t >= 7 ? '合格' : '需整改'; }
function loadScores() {
    fetch('/api/my_scores').then(function(r){return r.json()}).then(function(data){
        var h = '';
        if (data.length === 0) {
            h = '<tr><td colspan="7"><div class="empty-state"><i class="fas fa-inbox"></i>暂无评分记录</div></td></tr>';
        } else {
            data.forEach(function(s){
                var cls = getScoreClass(s.total_score);
                h += '<tr>' +
                    '<td>' + s.score_cleanliness + '</td>' +
                    '<td>' + s.score_safety + '</td>' +
                    '<td>' + s.score_discipline + '</td>' +
                    '<td><span class="score-circle score-' + cls + '">' + s.total_score + '</span></td>' +
                    '<td><span class="badge-tag badge-' + cls + '">' + getScoreLabel(s.total_score) + '</span></td>' +
                    '<td>' + (s.remark || '-') + '</td>' +
                    '<td style="font-size:0.78rem;color:#94a3b8;">' + s.created_at + '</td>' +
                    '</tr>';
            });
        }
        document.getElementById('scores-list').innerHTML = h;
    });
}
loadScores();
</script>
{% endblock %}
